<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — AI Kitchen Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-hero {
            position: relative;
            padding: 60px 40px;
            background: linear-gradient(to bottom, rgba(15, 15, 20, 0) 0%, var(--bg1) 100%);
            display: flex;
            align-items: flex-end;
            gap: 32px;
            margin-top: -80px;
            padding-top: 140px;
            z-index: 1;
        }

        .profile-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center 30%, rgba(99, 102, 241, 0.15) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        .profile-avatar-large {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--bg1);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            color: var(--text3);
            overflow: hidden;
            flex-shrink: 0;
        }

        .profile-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .profile-username {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .profile-bio {
            font-size: 1.05rem;
            color: var(--text2);
            line-height: 1.5;
            max-width: 600px;
        }

        .profile-stats-bar {
            display: flex;
            gap: 24px;
            margin-top: 8px;
        }

        .profile-stat {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .profile-stat-val {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .profile-stat-label {
            font-size: 0.9rem;
            color: var(--text3);
        }

        .profile-actions {
            display: flex;
            align-items: flex-end;
            margin-bottom: 24px;
        }

        #profileContent {
            padding: 0 40px 60px;
        }
    </style>
</head>

<body>
    <div class="dashboard-wrapper" style="min-height: 100vh; display: flex; flex-direction: column; width: 100%;">
        <!-- Ambient Background -->
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>

        <header class="topbar">
            <div style="display:flex; align-items:center; gap:16px;">
                <a href="dashboard.html" class="btn btn-ghost" style="padding:8px; font-size:1.25rem;">← Back</a>
            </div>
            <div id="authUserNav">
                <!-- Filled by JS if logged in -->
            </div>
        </header>

        <!-- Loading State -->
        <div id="profileLoading"
            style="display: flex; justify-content: center; align-items: center; flex: 1; padding: 100px;">
            <div class="spinner"></div>
        </div>

        <!-- Error State -->
        <div id="profileError" class="alert error" style="display: none; margin: 40px auto; max-width: 600px;">
            User profile not found.
        </div>

        <!-- Profile View -->
        <div id="profileView" style="display: none;">
            <section class="profile-hero">
                <div id="profileAvatar" class="profile-avatar-large">U</div>
                <div class="profile-info">
                    <h1 id="profileUsername" class="profile-username">User</h1>
                    <div id="profileBio" class="profile-bio"></div>
                    <div class="profile-stats-bar">
                        <div class="profile-stat">
                            <span id="statFollowers" class="profile-stat-val">0</span>
                            <span class="profile-stat-label">Followers</span>
                        </div>
                        <div class="profile-stat">
                            <span id="statFollowing" class="profile-stat-val">0</span>
                            <span class="profile-stat-label">Following</span>
                        </div>
                        <div class="profile-stat">
                            <span id="statRecipes" class="profile-stat-val">0</span>
                            <span class="profile-stat-label">Recipes</span>
                        </div>
                    </div>
                </div>
                <div class="profile-actions">
                    <button id="followBtn" class="btn btn-primary" style="display: none;" onclick="toggleFollow()">
                        <span class="btn-text">Follow User</span>
                        <span class="btn-loader" style="display:none;">⏳</span>
                    </button>
                    <!-- Small edit button if this is their own profile -->
                    <a id="editProfileBtn" href="dashboard.html" class="btn btn-secondary" style="display: none;">Edit
                        Profile</a>
                </div>
            </section>

            <main id="profileContent">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; margin-top: 24px;">
                    <h2 style="font-size: 1.5rem; letter-spacing: -0.01em;">Recipes by <span
                            id="sectionUsername">User</span></h2>
                </div>

                <div id="userRecipesGrid" class="recipe-grid">
                    <!-- Loaded dynamically -->
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
